Configuration:
  status: WARN

  # 定义全局变量
  Properties:
    Property:
      - name: BASE_DIR
        value: "D:/smart-weighing-shelf-system-assets/logs"
      - name: DATE_PATH
        value: "${date:yyyy-MM}"

  Appenders:
    # 控制台输出
    Console:
      name: Console
      target: SYSTEM_OUT
      ThresholdFilter:
        level: DEBUG
        onMatch: ACCEPT
        onMismatch: DENY
      PatternLayout:
        pattern: "[%d{HH:mm:ss.SSS}] %-5level %class{36} %L %M - %msg%xEx%n"

    RollingFile:
      # 1. DEBUG 日志：只存放 DEBUG 级别信息
      - name: RollingFileDebug
        fileName: "${BASE_DIR}/debug.log"
        filePattern: "${BASE_DIR}/${DATE_PATH}/debug-%d{yyyy-MM-dd}-%i.log.gz"
        Filters:
          ThresholdFilter:
            - level: INFO
              onMatch: DENY
              onMismatch: NEUTRAL
            - level: DEBUG
              onMatch: ACCEPT
              onMismatch: DENY
        PatternLayout:
          pattern: "[%d{yyyy-MM-dd HH:mm:ss}] %-5level %class{36} %L %M - %msg%xEx%n"
        Policies:
          SizeBasedTriggeringPolicy:
            size: "500 MB"
          TimeBasedTriggeringPolicy: { }

      # 2. INFO 日志：只存放 INFO 级别信息
      - name: RollingFileInfo
        fileName: "${BASE_DIR}/info.log"
        filePattern: "${BASE_DIR}/${DATE_PATH}/info-%d{yyyy-MM-dd}-%i.log.gz"
        Filters:
          ThresholdFilter:
            - level: WARN
              onMatch: DENY
              onMismatch: NEUTRAL
            - level: INFO
              onMatch: ACCEPT
              onMismatch: DENY
        PatternLayout:
          pattern: "[%d{yyyy-MM-dd HH:mm:ss}] %-5level %class{36} %L %M - %msg%xEx%n"
        Policies:
          SizeBasedTriggeringPolicy:
            size: "500 MB"
          TimeBasedTriggeringPolicy: { }

      # 3. ERROR 日志：存放 ERROR 及以上级别信息
      - name: RollingFileError
        fileName: "${BASE_DIR}/error.log"
        filePattern: "${BASE_DIR}/${DATE_PATH}/error-%d{yyyy-MM-dd}-%i.log.gz"
        ThresholdFilter:
          level: ERROR
        PatternLayout:
          pattern: "[%d{yyyy-MM-dd HH:mm:ss}] %-5level %class{36} %L %M - %msg%xEx%n"
        Policies:
          SizeBasedTriggeringPolicy:
            size: "500 MB"
          TimeBasedTriggeringPolicy: { }

  Loggers:
    # 全局配置：框架级别的日志只记录 INFO 及以上，屏蔽垃圾信息
    Root:
      level: INFO
      AppenderRef:
        - ref: Console
        - ref: RollingFileInfo
        - ref: RollingFileError

    Logger:
      # 业务逻辑配置：你的代码 (com.tairui.server) 开启 DEBUG 级别
      - name: com.tairui.server
        level: DEBUG
        additivity: false
        AppenderRef:
          - ref: Console
          - ref: RollingFileDebug
          - ref: RollingFileInfo
          - ref: RollingFileError

      # Druid SQL 监控配置
      - name: druid.sql.Statement
        level: DEBUG
        additivity: false
        AppenderRef:
          - ref: Console
          - ref: RollingFileDebug