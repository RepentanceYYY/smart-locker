spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  application:
    name: smart-weighing-shelf-system
    file:
      upload:
        borrow-photo-path: ${user.dir}/uploads
        borrow-photo-access: /uploads/
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
logging:
  config: classpath:log4j2-dev.yml
lock:
  simulation:
    mode: false   # true=模拟模式, false=真实硬件模式
# 人脸检测阈值配置
face-threshold-config:
  live-score-min: 0.3
  mouth-close-score-min: 0.9
  eye-close-max: 0.1
  blur-max: 0.2
  similarity: 80.0
